version: '3.8'

services:
  # ---------------------------------------------------------
  # 1. Primary Relational Database (PostgreSQL 16)
  # ---------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ums-postgres
    restart: always
    environment:
      POSTGRES_USER: ums_user
      POSTGRES_PASSWORD: ums_password
      POSTGRES_DB: ums_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ums_user -d ums_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ums-network

  # ---------------------------------------------------------
  # 2. High-Performance Cache (Redis 7.2)
  # ---------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: ums-redis
    restart: always
    command: redis-server --requirepass ums_redis_secure_pass
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ums_redis_secure_pass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ums-network

  # ---------------------------------------------------------
  # 3. Message Broker & Event Bus (RabbitMQ)
  # ---------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ums-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ums_mq_user
      RABBITMQ_DEFAULT_PASS: ums_mq_pass
    ports:
      - "5672:5672"     # AMQP Protocol
      - "15672:15672"   # Management Dashboard Console
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ums-network

  # ---------------------------------------------------------
  # 4. S3-Compatible Object Storage (MinIO)
  # ---------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: ums-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ums_minio_admin
      MINIO_ROOT_PASSWORD: ums_minio_password
    ports:
      - "9000:9000"     # S3 API Port
      - "9001:9001"     # Web Administration Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ums-network

  # ---------------------------------------------------------
  # 5. Secrets and Key Management (HashiCorp Vault OSS)
  # ---------------------------------------------------------
  vault:
    image: hashicorp/vault:1.16
    container_name: ums-vault
    restart: always
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ums_vault_root_token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"     # Vault HTTP API
    volumes:
      - vault_data:/vault/file
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ums-network

  # ---------------------------------------------------------
  # 6. Public API Gateway (Kong OSS Gateway)
  # ---------------------------------------------------------
  kong:
    image: kong:3.6-alpine
    container_name: ums-kong
    restart: always
    environment:
      KONG_DATABASE: "off"  # Declarative Mode (Zero lock-in)
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"     # Public HTTP Proxy Gateway
      - "8001:8001"     # Kong Admin API
    volumes:
      # Inject inline base declarative routing config
      - ./kong.yml:/usr/local/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ums-network

  # ---------------------------------------------------------
  # 7. Core Application Backend (NestJS API Service)
  # ---------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ums-api
    restart: always
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ums_user
      DB_PASSWORD: ums_password
      DB_NAME: ums_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ums_redis_secure_pass
      RM_HOST: rabbitmq
      RM_PORT: 5672
      RM_USER: ums_mq_user
      RM_PASS: ums_mq_pass
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ums-network

  # ---------------------------------------------------------
  # 8. User Console Frontend (React Vite Web Service)
  # ---------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ums-web
    restart: always
    ports:
      - "8080:80"       # Served via Nginx on localhost:8080
    depends_on:
      - api
    networks:
      - ums-network

# ---------------------------------------------------------
# Persistent Volume Declarations
# ---------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  vault_data:

# ---------------------------------------------------------
# Isolated Secure Networks
# ---------------------------------------------------------
networks:
  ums-network:
    driver: bridge
